<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="c"><rect width="512" height="512" rx="110" ry="110"/></clipPath>
    <radialGradient id="g" cx="78%" cy="10%" r="58%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8B7FFA" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#8B7FFA" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#13111F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#c)">
    <rect width="512" height="512" fill="#13111F"/>
    <rect width="512" height="512" fill="url(#g)"/>
    <!-- W as vector strokes, slightly italic -->
    <g fill="#8B7FFA" stroke="none">
      <!-- left outer leg: top-left to bottom-left -->
      <polygon points="161,159 193,159 234,353 202,353"/>
      <!-- left inner leg: bottom-left up to middle valley -->
      <polygon points="202,353 234,353 268,228 236,228"/>
      <!-- right inner leg: middle valley down to bottom-right -->
      <polygon points="236,228 268,228 302,353 270,353"/>
      <!-- right outer leg: bottom-right to top-right -->
      <polygon points="270,353 302,353 343,159 311,159"/>
    </g>
  </g>
  <rect width="512" height="512" rx="110" ry="110" fill="none" stroke="#8B7FFA" stroke-opacity="0.15" stroke-width="2"/>
</svg>
